name: enrich-phones

# Vercel Hobby no tiene cron, así que disparamos /api/cron/enrich-phones
# desde GitHub Actions cada 10 minutos. Cada tick procesa hasta 5 contactos
# (cap definido en el endpoint).
#
# Setup requerido:
#   1. En GitHub repo → Settings → Secrets and variables → Actions, agregar:
#        - APP_BASE_URL = https://wecad-prospecting.vercel.app
#        - CRON_SECRET = el mismo valor que la env var CRON_SECRET en Vercel
#   2. La env var CRON_SECRET tiene que estar también en Vercel (generala
#      con `openssl rand -hex 32` o cualquier string aleatorio largo).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger enrich-phones endpoint
        run: |
          curl -fsS -X POST \
            -H "x-webhook-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_BASE_URL }}/api/cron/enrich-phones" \
            --max-time 60 \
            | jq .
