name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup and Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e

          npm install -g vercel@latest --silent

          # Obtener el team ID (primer equipo del token)
          echo "=== Obteniendo team ID ==="
          TEAMS=$(curl -s "https://api.vercel.com/v2/teams" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Respuesta teams: $TEAMS"
          TEAM_ID=$(echo "$TEAMS" | jq -r '.teams[0].id // empty')
          echo "Team ID: $TEAM_ID"

          # Crear .vercel/project.json
          mkdir -p .vercel
          echo "{\"orgId\":\"$TEAM_ID\",\"projectId\":\"prj_SR2QnNm4XA6PzhZ42ThyJK1ogrEd\"}" > .vercel/project.json
          echo "Project config: $(cat .vercel/project.json)"

          # Deploy
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
